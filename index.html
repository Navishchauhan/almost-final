<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="landing">

<div class="petals"></div>

<div class="landing-container">

  <div class="glow-orb"></div>

  <h1 class="welcome-title">Welcome, Tanu ✨✨</h1>

  <p class="subtitle">On this day where we gift a book and a rose to a loved one, I thought of YOU</p>

  <button onclick="openLibrary()">Enter Library</button>

</div>

<script>
function openLibrary() {
  document.body.classList.add("fade-out");
  setTimeout(() => {
    window.location.href = "library.html";
  }, 700);
}

window.onload = () => document.body.classList.add('loaded');
</script>

<script src="script.js"></script>

</body>
</html>
